name: Deploy to Namecheap

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm install

      - name: Build Next.js
        run: npm run build

      - name: Create Deployment Package
        run: |
          mkdir deploy

          cp -r .next/standalone/* deploy/
          mkdir -p deploy/.next
          cp -r .next/static deploy/.next/
          cp -r public deploy/

          cd deploy
          zip -r ../deploy.zip .

      - name: Upload deploy.zip to Namecheap
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 162.0.217.219
          port: 21098
          username: beregulj
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: "deploy.zip"
          target: "/home/beregulj"

      - name: Deploy on Server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 162.0.217.219
          port: 21098
          username: beregulj
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            set -e

            cd /home/beregulj

            echo "Removing previous temporary deployment..."
            rm -rf deploy_temp

            echo "Creating deployment directory..."
            mkdir deploy_temp

            echo "Extracting deploy.zip..."
            unzip -oq deploy.zip -d deploy_temp

            echo "Cleaning application directory..."
            find /home/beregulj/public_html/shopify -mindepth 1 -delete

            echo "Copying new files..."
            cp -a deploy_temp/. /home/beregulj/public_html/shopify/

            echo "Removing temporary files..."
            rm -rf deploy_temp
            rm -f deploy.zip

            echo "======================================"
            echo "Deployment completed successfully!"
            echo "Please restart the Node.js app from cPanel."
            echo "======================================"