name: Deploy to Namecheap

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm install

      - name: Build Next.js
        run: npm run build

      - name: Create Deployment Package
        run: |
          mkdir deploy

          # Copy standalone app
          cp -a .next/standalone/. deploy/

          # Copy complete .next folder
          cp -a .next/standalone/.next deploy/

          # Copy static assets
          cp -a .next/static deploy/.next/

          # Copy public folder
          cp -a public deploy/

          cd deploy
          zip -r ../deploy.zip .

      - name: Upload deploy.zip
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 162.0.217.219
          port: 21098
          username: beregulj
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: "deploy.zip"
          target: "/home/beregulj"

      - name: Deploy on Server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 162.0.217.219
          port: 21098
          username: beregulj
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            set -e

            cd /home/beregulj

            rm -rf deploy_temp
            mkdir deploy_temp

            unzip -oq deploy.zip -d deploy_temp

            cd /home/beregulj/public_html/shopify

            # Delete everything except .htaccess and tmp
            find . \
              -mindepth 1 \
              ! -name ".htaccess" \
              ! -name "tmp" \
              -exec rm -rf {} +

            # Copy new files
            cp -a /home/beregulj/deploy_temp/. .

            # Cleanup
            rm -rf /home/beregulj/deploy_temp
            rm -f /home/beregulj/deploy.zip

            # Restart Passenger
            mkdir -p tmp
            touch tmp/restart.txt

            echo "====================================="
            echo "Deployment Completed Successfully!"
            echo "====================================="